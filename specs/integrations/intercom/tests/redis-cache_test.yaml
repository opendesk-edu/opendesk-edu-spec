suite: Intercom Service Redis token caching config
templates:
  - deployment.yaml
tests:
  - it: should configure Redis host
    release:
      name: intercom
    set:
      redis:
        host: redis
        port: 6379
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: intercom
        document:
          spec:
            template:
              spec:
                containers:
                  - name: intercom
                    env:
                      - name: REDIS_HOST
                        value: redis
                      - name: REDIS_PORT
                        value: "6379"

  - it: should set Redis password from secret
    release:
      name: intercom
    set:
      redis:
        passwordSecretRef:
          name: centralnavigation-intercom
          key: redis_password
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: intercom
        document:
          spec:
            template:
              spec:
                containers:
                  - name: intercom
                    env:
                      - name: REDIS_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: centralnavigation-intercom
                            key: redis_password

  - it: should enable Redis caching for silent login tokens
    release:
      name: intercom
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: intercom
        document:
          spec:
            template:
              spec:
                containers:
                  - name: intercom
                    env:
                      - name: REDIS_CACHE_ENABLED
                        value: "true"

  - it: should set Redis TTL for silent login tokens to 300 seconds
    release:
      name: intercom
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: intercom
        document:
          spec:
            template:
              spec:
                containers:
                  - name: intercom
                    env:
                      - name: SILENT_LOGIN_TOKEN_TTL
                        value: "300"

  - it: should use correct Redis key prefix for tokens
    release:
      name: intercom
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: intercom
        document:
          spec:
            template:
              spec:
                containers:
                  - name: intercom
                    env:
                      - name: REDIS_KEY_PREFIX
                        value: "intercom:token"

  - it: should configure Redis pool size
    release:
      name: intercom
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: intercom
        document:
          spec:
            template:
              spec:
                containers:
                  - name: intercom
                    env:
                      - name: REDIS_POOL_SIZE
                        value: "10"

  - it: should configure Redis connection timeout
    release:
      name: intercom
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: intercom
        document:
          spec:
            template:
              spec:
                containers:
                  - name: intercom
                    env:
                      - name: REDIS_CONNECT_TIMEOUT
                        value: "5000"

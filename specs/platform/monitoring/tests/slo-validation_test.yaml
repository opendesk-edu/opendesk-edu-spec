suite: Monitoring Service Level Objective (SLO) thresholds config
templates:
  - servicemonitor.yaml
tests:
  - it: should have SLO for Critical tier services (99.9% availability, <100ms latency)
    release:
      name: monitoring
    asserts:
      - containsDocument:
          kind: ServiceMonitor
          apiVersion: monitoring.coreos.com/v1
          name: keycloak
        document:
          spec:
            endpoints:
              - interval: 30s
      - containsDocument:
          kind: PrometheusRule
          apiVersion: monitoring.coreos.com/v1
          name: keycloak-slo-rules
        document:
          spec:
            groups:
              - name: keycloak.slo
                rules:
                  - alert: KeycloakAvailabilityTooLow
                    expr: |
                      (1 - rate(keycloak_http_requests_total{status=~"5.."}[5m]))
                      < 0.999

  - it: should have SLO for High tier services (99.5% availability, <250ms latency)
    release:
      name: monitoring
    asserts:
      - containsDocument:
          kind: PrometheusRule
          apiVersion: monitoring.coreos.com/v1
          name: nextcloud-slo-rules
        document:
          spec:
            groups:
              - name: nextcloud.slo
                rules:
                  - alert: NextcloudAvailabilityTooLow
                    expr: |
                      (1 - rate(nextcloud_http_requests_total{status=~"5.."}[5m]))
                      < 0.995
                  - alert: NextcloudLatencyTooHigh
                    expr: |
                      rate(nextcloud_http_request_duration_seconds_sum{quantile="0.99"}[5m])
                      / rate(nextcloud_http_request_duration_seconds_count[5m]) > 0.25

  - it: should have SLO for Standard tier services (99.0% availability, <500ms latency)
    release:
      name: monitoring
    asserts:
      - containsDocument:
          kind: PrometheusRule
          apiVersion: monitoring.coreos.com/v1
          name: moodle-slo-rules
        document:
          spec:
            groups:
              - name: moodle.slo
                rules:
                  - alert: MoodleAvailabilityTooLow
                    expr: |
                      (1 - rate(moodle_http_requests_total{status=~"5.."}[5m]))
                      < 0.99

  - it: should define SLO alerting tiers (Critical, High, Standard)
    release:
      name: monitoring
    asserts:
      - containsDocument:
          kind: PrometheusRule
          apiVersion: monitoring.coreos.com/v1
          name: slo-alert-rules
        document:
          spec:
            groups:
              - name: slo.critical
                rules:
                  - alert: CriticalServiceDown
                    for: 5m
              - name: slo.high
                rules:
                  - alert: HighServiceSLOBreach
                    for: 15m
              - name: slo.standard
                rules:
                  - alert: StandardServiceSLOBreach
                    for: 30m

  - it: should have ServiceMonitor for Keycloak (Critical tier)
    release:
      name: monitoring
    asserts:
      - containsDocument:
          kind: ServiceMonitor
          apiVersion: monitoring.coreos.com/v1
          name: keycloak
        document:
          spec:
            selector:
              matchLabels:
                app: keycloak
            endpoints:
              - port: http
                interval: 30s
                path: /metrics

  - it: should have ServiceMonitor for Nextcloud (High tier)
    release:
      name: monitoring
    asserts:
      - containsDocument:
          kind: ServiceMonitor
          apiVersion: monitoring.coreos.com/v1
          name: nextcloud
        document:
          spec:
            selector:
              matchLabels:
                app: nextcloud
            endpoints:
              - port: http
                interval: 60s
                path: /metrics

  - it: should query service-specific metrics for SLO tracking
    release:
      name: monitoring
    asserts:
      - containsDocument:
          kind: PrometheusRule
          apiVersion: monitoring.coreos.com/v1
          name: slo-metrics-rules
        document:
          spec:
            groups:
              - name: slo.metrics
                rules:
                  - record: service_availability_total
                    expr: |
                      rate(http_requests_total{status!~"5.."}[5m])
                      / rate(http_requests_total[5m])
                  - record: service_latency_p99
                    expr: |
                      rate(http_request_duration_seconds_sum{quantile="0.99"}[5m])
                      / rate(http_request_duration_seconds_count[5m])
